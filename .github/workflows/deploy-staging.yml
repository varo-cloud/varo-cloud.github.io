name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: pages-staging
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build staging
        env:
          VITE_USE_MOCK: 'false'
          VITE_API_BASE_URL: https://staging.api.varo.cloud/api
          VITE_BASE: /
          # Cloudflare 官方测试 Site Key（始终通过），与 staging 后端 TURNSTILE_SECRET_KEY 配对
          VITE_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}
          VITE_DOCS_URL: https://varocloudtest.mintlify.site/docs
          VITE_INFERENCE_API_BASE_URL: https://staging.inference.varo.cloud/v1
        run: npm run build:staging

      - name: Setup SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Deploy to varo-staging.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.STAGING_DEPLOY_TOKEN }}
          external_repository: varo-staging/varo-staging.github.io
          publish_branch: main
          publish_dir: dist
